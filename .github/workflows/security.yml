name: AG-SECURITY — Sicherheits-Scanner

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Jeden Dienstag 05:00 UTC — wöchentlicher Full-Scan
    - cron: "0 5 * * 2"

jobs:
  dependency-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (kritische Lücken)
        run: |
          # Bricht ab wenn HIGH oder CRITICAL Vulnerabilities gefunden
          npm audit --audit-level=high --json > audit-report.json || true

          CRITICAL=$(cat audit-report.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const v = d.metadata?.vulnerabilities || {};
            console.log((v.critical || 0) + ' critical, ' + (v.high || 0) + ' high');
            process.exit((v.critical || 0) > 0 ? 1 : 0);
          ")
          echo "Audit: $CRITICAL"

      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  secrets-scan:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan für hardkodierte Secrets
        run: |
          set +e
          FOUND=0

          # Patterns die niemals im Code sein sollten
          patterns=(
            "sk-ant-[A-Za-z0-9]+"
            "sk-[A-Za-z0-9]{48}"
            "eyJhbGciOiJIUzI1NiJ9\."
            "SUPABASE_SERVICE_ROLE_KEY\s*=\s*['\"][^'\"]{20}"
            "ANTHROPIC_API_KEY\s*=\s*['\"][^'\"]{10}"
            "MOLLIE_API_KEY\s*=\s*['\"][^'\"]{10}"
            "live_[A-Za-z0-9]{20,}"
            "test_[A-Za-z0-9]{20,}"
          )

          for pattern in "${patterns[@]}"; do
            MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
              --include="*.json" --include="*.yml" \
              -E "$pattern" \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.next \
              . 2>/dev/null \
              | grep -v 'xxxx' \
              || true)

            if [ -n "$MATCHES" ]; then
              echo "::error::Moeglicher Secret-Leak gefunden (Pattern: $pattern)"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "::error::Secrets-Scan FEHLGESCHLAGEN — Credentials dürfen nie im Code sein!"
            exit 1
          else
            echo "✓ Keine hardkodierten Secrets gefunden"
          fi

  env-file-check:
    name: .env Dateien im Git
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: .env Dateien prüfen
        run: |
          # Prüft ob versehentlich .env Dateien committed wurden
          ENV_FILES=$(find . -name ".env*" -not -path "./.git/*" -not -name ".env.example" -not -name ".env.local.example" 2>/dev/null || true)

          if [ -n "$ENV_FILES" ]; then
            echo "::error::.env Dateien im Repository gefunden!"
            echo "$ENV_FILES"
            exit 1
          else
            echo "✓ Keine .env Dateien im Repository"
          fi

  typescript-strict:
    name: TypeScript Strict Mode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  create-security-issue:
    name: GitHub Issue bei Fehler
    runs-on: ubuntu-latest
    needs: [dependency-audit, secrets-scan, env-file-check]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Sicherheits-Issue erstellen
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Labels erstellen falls sie nicht existieren
            for (const label of ['security', 'automated', 'bug']) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: label === 'security' ? 'd73a4a' : label === 'bug' ? 'e11d48' : '6b7280' });
              }
            }

            // Pruefen ob bereits ein offenes Security-Issue existiert
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
              per_page: 5,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Erneut fehlgeschlagen: Commit ${context.sha.substring(0,8)} — [Log](${run_url})`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'AG-SECURITY: Sicherheitsproblem auf main gefunden',
              body: `## Sicherheits-Scan fehlgeschlagen\n\n**Branch:** main\n**Commit:** ${context.sha.substring(0,8)}\n**Zeit:** ${new Date().toISOString()}\n\n**→ [Action-Log ansehen](${run_url})**\n\n### Was zu tun ist\n- [ ] Action-Log oeffnen und Fehler lesen\n- [ ] Problem beheben\n- [ ] Neuen Commit pushen\n\n---\n*Automatisch erstellt von AG-SECURITY*`,
              labels: ['security', 'automated', 'bug'],
            });
