name: AG-UPTIME — Health Monitor

on:
  schedule:
    # Alle 5 Minuten — GitHub's Minimum-Intervall
    - cron: "*/5 * * * *"
  # Manuell triggerbar für Tests
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    # Läuft auch wenn andere Workflows fehlschlagen
    concurrency:
      group: uptime-monitor
      cancel-in-progress: false

    steps:
      - name: Ping /api/health
        id: ping
        run: |
          APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL || vars.APP_URL }}"

          if [ -z "$APP_URL" ]; then
            echo "::warning::APP_URL nicht gesetzt — Health-Check übersprungen"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Pinge: $APP_URL/api/health"

          HTTP_CODE=$(curl -s -o /tmp/health-response.json -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            "$APP_URL/api/health" || echo "000")

          echo "HTTP Status: $HTTP_CODE"
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "000" ]; then
            echo "status=unreachable" >> $GITHUB_OUTPUT
            echo "detail=Server nicht erreichbar (Timeout/Netzwerkfehler)" >> $GITHUB_OUTPUT
          elif [ "$HTTP_CODE" = "200" ]; then
            # Prüfe ob status=healthy im Body
            HEALTH_STATUS=$(cat /tmp/health-response.json | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            print(d.get('status', 'unknown'))
          except:
            print('parse_error')
          " 2>/dev/null || echo "parse_error")

            if [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "status=healthy" >> $GITHUB_OUTPUT
              echo "✅ Server gesund (HTTP 200, status=healthy)"
            else
              echo "status=degraded" >> $GITHUB_OUTPUT
              echo "detail=HTTP 200 aber status=$HEALTH_STATUS" >> $GITHUB_OUTPUT
              echo "⚠️ Server degraded: $HEALTH_STATUS"
              cat /tmp/health-response.json
            fi
          elif [ "$HTTP_CODE" = "503" ]; then
            DETAIL=$(cat /tmp/health-response.json | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            checks = d.get('checks', {})
            problems = []
            if not checks.get('database', {}).get('ok'):
              problems.append('DB: ' + checks.get('database', {}).get('detail', 'Fehler'))
            if not checks.get('env', {}).get('ok'):
              problems.append('ENV: ' + checks.get('env', {}).get('detail', 'Fehler'))
            print(', '.join(problems) if problems else 'Service degraded')
          except:
            print('Service nicht verfügbar')
          " 2>/dev/null || echo "Service nicht verfügbar")
            echo "status=down" >> $GITHUB_OUTPUT
            echo "detail=$DETAIL" >> $GITHUB_OUTPUT
            echo "🔴 Server DOWN: $DETAIL"
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "detail=Unerwarteter HTTP-Status: $HTTP_CODE" >> $GITHUB_OUTPUT
            echo "🔴 Unerwarteter Status: $HTTP_CODE"
          fi

      - name: Issue erstellen bei Ausfall
        if: |
          steps.ping.outputs.status == 'down' ||
          steps.ping.outputs.status == 'unreachable' ||
          steps.ping.outputs.status == 'error'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.ping.outputs.status }}';
            const detail = '${{ steps.ping.outputs.detail }}';
            const httpCode = '${{ steps.ping.outputs.http_code }}';
            const appUrl = '${{ secrets.NEXT_PUBLIC_APP_URL || vars.APP_URL }}';
            const now = new Date();

            // Prüfen ob bereits ein offenes Uptime-Issue existiert
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'uptime,automated',
              state: 'open',
              per_page: 5,
            });

            const alreadyOpen = existingIssues.some(i =>
              i.title.includes('AG-UPTIME') && i.title.includes('DOWN')
            );

            if (alreadyOpen) {
              // Existierendes Issue kommentieren statt neues erstellen
              const issue = existingIssues.find(i => i.title.includes('AG-UPTIME'));
              if (issue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `🔴 **Immer noch DOWN** — ${now.toISOString()}\n- Status: \`${status}\`\n- Detail: ${detail}\n- HTTP: ${httpCode}`,
                });
              }
              return;
            }

            // Neues Issue erstellen
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 AG-UPTIME: Server DOWN — ${now.toLocaleString('de-DE')}`,
              body: [
                `## Server nicht verfügbar`,
                ``,
                `**URL:** ${appUrl}/api/health`,
                `**Status:** \`${status}\``,
                `**HTTP-Code:** ${httpCode}`,
                `**Detail:** ${detail}`,
                `**Zeit:** ${now.toISOString()}`,
                ``,
                `### Sofort-Check`,
                `\`\`\`bash`,
                `curl -v ${appUrl}/api/health`,
                `\`\`\``,
                ``,
                `### Mögliche Ursachen`,
                `- Vercel-Deployment fehlgeschlagen`,
                `- Supabase DB nicht erreichbar`,
                `- Env-Variablen fehlen in Production`,
                `- Rate-Limit erreicht`,
                ``,
                `**→ [Vercel Logs prüfen](https://vercel.com/dashboard)**`,
                ``,
                `---`,
                `*Automatisch erstellt von AG-UPTIME • ${now.toISOString()}*`,
              ].join('\n'),
              labels: ['uptime', 'automated', 'critical'],
            });

      - name: Issue schließen wenn wieder gesund
        if: steps.ping.outputs.status == 'healthy'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Offene Uptime-Issues schließen
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'uptime,automated',
              state: 'open',
              per_page: 10,
            });

            for (const issue of openIssues) {
              if (!issue.title.includes('AG-UPTIME')) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Server wieder erreichbar** — ${new Date().toISOString()}\n\nHealth-Check erfolgreich. Issue wird geschlossen.`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
