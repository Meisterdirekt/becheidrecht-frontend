name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: TypeScript + Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  content-guard:
    name: Content Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for content/ changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- content/)
          if [ -n "$CHANGED" ]; then
            echo "::warning::content/ wurde geaendert. Bitte juristisch pruefen:"
            echo "$CHANGED"
            echo ""
            echo "Betroffene Dateien in content/ sind rechtlich sensibel (Fehlerkatalog, Weisungen, Quellen)."
            echo "Sicherstellen dass Aenderungen juristisch korrekt sind."
          fi

      - name: Check for vault/ changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- vault/ src/lib/vault/)
          if [ -n "$CHANGED" ]; then
            echo "::error::vault/ wurde geaendert! Das sollte nie passieren."
            echo "$CHANGED"
            exit 1
          fi
